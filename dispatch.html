<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>派发工作台</title>
  <link rel="stylesheet" href="taskflow.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>派发工作台</h1>
      <div class="nav">
        <a class="button secondary" href="admin.html" id="adminLink" style="display:none">用户管理</a>
        <a class="button secondary" href="receive.html" id="receiveLink">接收工作台</a>
        <span class="account" id="account"></span>
        <button class="secondary" type="button" id="logoutButton">退出</button>
      </div>
    </div>
  </header>

  <main>
    <div class="stats">
      <div class="stat"><span>待接收</span><strong id="statPending">0</strong></div>
      <div class="stat"><span>已接收待汇款</span><strong id="statAccepted">0</strong></div>
      <div class="stat"><span>待确认收款</span><strong id="statProof">0</strong></div>
      <div class="stat"><span>待上分确认</span><strong id="statCredit">0</strong></div>
      <div class="stat"><span>已拒绝</span><strong id="statRejected">0</strong></div>
    </div>

    <div class="layout">
      <section>
        <div class="section-head">
          <h2>派发任务</h2>
        </div>
        <form id="taskForm">
          <div class="field">
            <label for="taskType">任务类型</label>
            <select id="taskType" name="task_type">
              <option>线上支付</option>
              <option>线下收款</option>
            </select>
          </div>

          <div id="onlineFields">
            <div class="field">
              <label for="onlineLeader">组长</label>
              <select id="onlineLeader" name="online_leader">
                <option value="">请选择组长</option>
                <option>刘总</option>
                <option>山河</option>
                <option>军阀</option>
                <option>阿阳</option>
                <option>小志</option>
                <option>三七</option>
                <option>胖虎</option>
                <option>天顺</option>
                <option>燃燃</option>
                <option>杨不封</option>
              </select>
            </div>
            <div class="field">
              <label for="onlineTransferBank">转款银行</label>
              <input id="onlineTransferBank" name="online_transfer_bank">
            </div>
            <div class="field">
              <label for="onlineTransferAmount">转款金额</label>
              <input id="onlineTransferAmount" name="online_transfer_amount">
            </div>
          </div>

          <div id="offlineFields" class="hidden">
            <div class="field">
              <label for="offlineBusinessName">组长</label>
              <select id="offlineBusinessName" name="offline_business_name">
                <option value="">请选择组长</option>
                <option>刘总</option>
                <option>山河</option>
                <option>军阀</option>
                <option>阿阳</option>
                <option>小志</option>
                <option>三七</option>
                <option>胖虎</option>
                <option>天顺</option>
                <option>燃燃</option>
                <option>杨不封</option>
              </select>
            </div>
            <div class="field">
              <label for="offlineCompanyName">公司名</label>
              <input id="offlineCompanyName" name="offline_company_name">
            </div>
            <div class="field">
              <label for="offlineCustomerName">客户名字</label>
              <input id="offlineCustomerName" name="offline_customer_name">
            </div>
            <div class="grid-2">
              <div class="field">
                <label for="offlineDatetime">日期时间</label>
                <input id="offlineDatetime" name="offline_datetime" type="datetime-local">
              </div>
              <div class="field">
                <label for="offlineAmount">金额</label>
                <input id="offlineAmount" name="offline_amount">
              </div>
            </div>
            <div class="grid-2">
              <div class="field">
                <label for="offlineCurrency">币种</label>
                <input id="offlineCurrency" name="offline_currency">
              </div>
              <div class="field">
                <label for="offlineMaterial">料子</label>
                <input id="offlineMaterial" name="offline_material">
              </div>
            </div>
            <div class="grid-2">
              <div class="field">
                <label for="offlineTimes">次数</label>
                <input id="offlineTimes" name="offline_times">
              </div>
              <div class="field">
                <label for="offlineMaintenancePeriod">维护期</label>
                <input id="offlineMaintenancePeriod" name="offline_maintenance_period">
              </div>
            </div>
            <div class="grid-2">
              <div class="field">
                <label for="offlineTailCustomer">是否后期尾刀客户</label>
                <select id="offlineTailCustomer" name="offline_tail_customer">
                  <option>否</option>
                  <option>是</option>
                </select>
              </div>
              <div class="field">
                <label for="offlineContact">联系方式</label>
                <input id="offlineContact" name="offline_contact" value="不写">
              </div>
            </div>
            <div class="field">
              <label for="offlineAddress">详细地址</label>
              <textarea id="offlineAddress" name="offline_address"></textarea>
            </div>
          </div>

          <div class="field">
            <label for="description">备注</label>
            <textarea id="description" name="description"></textarea>
          </div>
          <button type="submit">派发</button>
        </form>
      </section>

      <section>
        <div class="tabs">
          <button class="tab active" data-tab="pending" type="button">待接收</button>
          <button class="tab" data-tab="accepted" type="button">已接收待汇款</button>
          <button class="tab" data-tab="proof" type="button">待确认收款</button>
          <button class="tab" data-tab="credit" type="button">待上分确认</button>
          <button class="tab" data-tab="rejected" type="button">已拒绝</button>
          <button class="tab" data-tab="cancelled" type="button">已取消</button>
          <button class="tab" data-tab="history" type="button">历史</button>
        </div>
        <div class="section-body">
          <div id="historyToolbar" class="toolbar hidden">
            <input id="historyKeyword" placeholder="搜索历史">
            <button class="secondary" type="button" id="historySearch">搜索</button>
          </div>
          <div id="taskList" class="list"></div>
        </div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="taskflow-api.js"></script>
  <script>
    let state = { tab: 'pending', tasks: [], history: [], firstLoad: true, refreshing: false, lastSignature: '', editingTaskId: null };

    document.addEventListener('DOMContentLoaded', () => {
      if (!TaskFlow.requireLogin()) return;
      bindEvents();
      load();
      setInterval(renderTimers, 30000);
      setInterval(refreshQuietly, 15000);
    });

    function bindEvents() {
      document.getElementById('logoutButton').addEventListener('click', async () => {
        await TaskFlow.logout();
        location.href = 'index.html';
      });
      document.getElementById('taskType').addEventListener('change', toggleFields);
      document.getElementById('taskForm').addEventListener('submit', createTask);
      document.getElementById('historySearch').addEventListener('click', searchHistory);
      document.querySelectorAll('.tab').forEach((button) => {
        button.addEventListener('click', () => {
          state.tab = button.dataset.tab;
          document.querySelectorAll('.tab').forEach((tab) => tab.classList.remove('active'));
          button.classList.add('active');
          render();
        });
      });
    }

    function toggleFields() {
      const online = document.getElementById('taskType').value === '线上支付';
      document.getElementById('onlineFields').classList.toggle('hidden', !online);
      document.getElementById('offlineFields').classList.toggle('hidden', online);
    }

    async function load() {
      try {
        TaskFlow.setLoading(true);
        const data = await TaskFlow.dashboard();
        applyDashboard(data, false);
      } catch (error) {
        if (isSessionError(error)) {
          TaskFlow.clearSession();
          location.href = 'index.html';
          return;
        }
        TaskFlow.toast(error.message || String(error));
      } finally {
        state.firstLoad = false;
        TaskFlow.setLoading(false);
      }
    }

    async function refreshQuietly() {
      if (state.refreshing || document.hidden) return;
      state.refreshing = true;
      try {
        const data = await TaskFlow.dashboard();
        applyDashboard(data, true);
      } catch (error) {
        if (isSessionError(error)) {
          TaskFlow.clearSession();
          location.href = 'index.html';
        }
      } finally {
        state.refreshing = false;
      }
    }

    function applyDashboard(data, notifyChange) {
      const user = data.user || {};
      TaskFlow.saveUser(user);
      if (!user.canDispatch) {
        location.href = user.canReceive ? 'receive.html' : 'index.html';
        return;
      }
      const nextSignature = taskSignature(data);
      if (notifyChange && state.lastSignature && nextSignature !== state.lastSignature) {
        TaskFlow.toast('任务状态已更新');
      }
      state.lastSignature = nextSignature;
      document.getElementById('receiveLink').classList.toggle('hidden', !user.canReceive);
      document.getElementById('adminLink').classList.toggle('hidden', !user.isAdmin);
      document.getElementById('account').innerHTML = TaskFlow.currentUserLabel();
      state.tasks = data.tasks || [];
      state.history = data.history || [];
      renderStats(data.stats || {});
      render();
    }

    function taskSignature(data) {
      return (data.tasks || [])
        .map((task) => [task.task_id, task.status, task.accepted_by, task.confirmed_at, task.transfer_proof_url, task.updated_at].join(':'))
        .join('|') + `#${(data.history || []).length}`;
    }

    function isSessionError(error) {
      const text = error && error.message ? error.message : String(error);
      return text.indexOf('登录') !== -1 || text.indexOf('请先') !== -1;
    }

    async function createTask(event) {
      event.preventDefault();
      try {
        TaskFlow.setLoading(true);
        const form = event.currentTarget;
        const payload = Object.fromEntries(new FormData(form).entries());
        const data = await TaskFlow.createTask(payload);
        form.reset();
        document.getElementById('offlineContact').value = '不写';
        toggleFields();
        applyDashboard(data);
        TaskFlow.toast('任务已派发');
      } catch (error) {
        TaskFlow.toast(error.message || String(error));
      } finally {
        TaskFlow.setLoading(false);
      }
    }

    async function searchHistory() {
      try {
        TaskFlow.setLoading(true);
        state.history = await TaskFlow.searchHistory(document.getElementById('historyKeyword').value);
        render();
      } catch (error) {
        TaskFlow.toast(error.message || String(error));
      } finally {
        TaskFlow.setLoading(false);
      }
    }

    async function confirmCredit(taskId) {
      try {
        TaskFlow.setLoading(true);
        const data = await TaskFlow.confirmCredit(taskId, '确认上分');
        applyDashboard(data);
        TaskFlow.toast('已确认上分，任务完结');
      } catch (error) {
        TaskFlow.toast(error.message || String(error));
      } finally {
        TaskFlow.setLoading(false);
      }
    }

    async function uploadProof(taskId) {
      const input = document.getElementById(`proof-${taskId}`);
      if (!input.files || !input.files[0]) {
        TaskFlow.toast('请先选择汇款图片');
        return;
      }
      const file = input.files[0];
      if (!file.type || file.type.indexOf('image/') !== 0) {
        TaskFlow.toast('只能上传图片');
        return;
      }
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          TaskFlow.setLoading(true);
          const data = await TaskFlow.uploadTransferProof(taskId, file, reader.result);
          applyDashboard(data);
          TaskFlow.toast('汇款图片已上传');
        } catch (error) {
          TaskFlow.toast(error.message || String(error));
        } finally {
          TaskFlow.setLoading(false);
        }
      };
      reader.readAsDataURL(file);
    }

    function renderStats(stats) {
      document.getElementById('statPending').textContent = stats.pending || 0;
      document.getElementById('statAccepted').textContent = stats.accepted || 0;
      document.getElementById('statProof').textContent = stats.proofUploaded || 0;
      document.getElementById('statCredit').textContent = stats.creditPending || 0;
      document.getElementById('statRejected').textContent = stats.rejected || 0;
    }

    function visibleRows() {
      if (state.tab === 'history') return state.history;
      const map = { pending: '待接收', accepted: '已接收', proof: '待确认收款', credit: '待上分确认', rejected: '已拒绝', cancelled: '已取消' };
      return state.tasks.filter((task) => task.status === map[state.tab]);
    }

    function render() {
      document.getElementById('historyToolbar').classList.toggle('hidden', state.tab !== 'history');
      const rows = visibleRows();
      document.getElementById('taskList').innerHTML = rows.length ? rows.map(renderTask).join('') : '<div class="empty">暂无数据</div>';
      renderTimers();
    }

    const EDITABLE_STATUSES = ['待接收', '已接收', '已拒绝'];

    function toggleEdit(taskId) {
      state.editingTaskId = (state.editingTaskId === taskId) ? null : taskId;
      render();
    }

    async function saveEdit(taskId) {
      const form = document.getElementById(`editForm-${taskId}`);
      const payload = Object.fromEntries(new FormData(form).entries());
      try {
        TaskFlow.setLoading(true);
        const data = await TaskFlow.updateTask(taskId, payload);
        state.editingTaskId = null;
        applyDashboard(data);
        TaskFlow.toast('订单已更新');
      } catch (error) {
        TaskFlow.toast(error.message || String(error));
      } finally {
        TaskFlow.setLoading(false);
      }
    }

    function editForm(task) {
      if (task.task_type === '线上支付') {
        return `
          <form id="editForm-${task.task_id}" class="edit-form">
            <div class="grid-2">
              <div class="field">
                <label>组长</label>
                <select name="online_leader">
                  ${['刘总','山河','军阀','阿阳','小志','三七','胖虎','天顺','燃燃','杨不封'].map((n) =>
                    `<option${task.online_leader === n ? ' selected' : ''}>${TaskFlow.escapeHtml(n)}</option>`
                  ).join('')}
                </select>
              </div>
              <div class="field">
                <label>转款银行</label>
                <input name="online_transfer_bank" value="${TaskFlow.escapeAttr(task.online_transfer_bank)}">
              </div>
            </div>
            <div class="field">
              <label>转款金额</label>
              <input name="online_transfer_amount" value="${TaskFlow.escapeAttr(task.online_transfer_amount)}">
            </div>
            <div class="field">
              <label>备注</label>
              <textarea name="description">${TaskFlow.escapeHtml(task.description)}</textarea>
            </div>
            <div class="button-row">
              <button type="button" onclick="saveEdit('${task.task_id}')">保存</button>
              <button class="secondary" type="button" onclick="toggleEdit('${task.task_id}')">取消</button>
            </div>
          </form>
        `;
      }
      return `
        <form id="editForm-${task.task_id}" class="edit-form">
          <div class="grid-2">
            <div class="field">
              <label>组长</label>
              <select name="offline_business_name">
                ${['刘总','山河','军阀','阿阳','小志','三七','胖虎','天顺','燃燃','杨不封'].map((n) =>
                  `<option${task.offline_business_name === n ? ' selected' : ''}>${TaskFlow.escapeHtml(n)}</option>`
                ).join('')}
              </select>
            </div>
            <div class="field">
              <label>公司名</label>
              <input name="offline_company_name" value="${TaskFlow.escapeAttr(task.offline_company_name)}">
            </div>
          </div>
          <div class="grid-2">
            <div class="field">
              <label>客户名字</label>
              <input name="offline_customer_name" value="${TaskFlow.escapeAttr(task.offline_customer_name)}">
            </div>
            <div class="field">
              <label>日期时间</label>
              <input name="offline_datetime" type="datetime-local" value="${TaskFlow.escapeAttr(task.offline_datetime)}">
            </div>
          </div>
          <div class="grid-2">
            <div class="field">
              <label>金额</label>
              <input name="offline_amount" value="${TaskFlow.escapeAttr(task.offline_amount)}">
            </div>
            <div class="field">
              <label>币种</label>
              <input name="offline_currency" value="${TaskFlow.escapeAttr(task.offline_currency)}">
            </div>
          </div>
          <div class="grid-2">
            <div class="field">
              <label>料子</label>
              <input name="offline_material" value="${TaskFlow.escapeAttr(task.offline_material)}">
            </div>
            <div class="field">
              <label>次数</label>
              <input name="offline_times" value="${TaskFlow.escapeAttr(task.offline_times)}">
            </div>
          </div>
          <div class="grid-2">
            <div class="field">
              <label>维护期</label>
              <input name="offline_maintenance_period" value="${TaskFlow.escapeAttr(task.offline_maintenance_period)}">
            </div>
            <div class="field">
              <label>尾刀客户</label>
              <select name="offline_tail_customer">
                <option${task.offline_tail_customer !== '是' ? ' selected' : ''}>否</option>
                <option${task.offline_tail_customer === '是' ? ' selected' : ''}>是</option>
              </select>
            </div>
          </div>
          <div class="grid-2">
            <div class="field">
              <label>联系方式</label>
              <input name="offline_contact" value="${TaskFlow.escapeAttr(task.offline_contact)}">
            </div>
          </div>
          <div class="field">
            <label>详细地址</label>
            <textarea name="offline_address">${TaskFlow.escapeHtml(task.offline_address)}</textarea>
          </div>
          <div class="field">
            <label>备注</label>
            <textarea name="description">${TaskFlow.escapeHtml(task.description)}</textarea>
          </div>
          <div class="button-row">
            <button type="button" onclick="saveEdit('${task.task_id}')">保存</button>
            <button class="secondary" type="button" onclick="toggleEdit('${task.task_id}')">取消</button>
          </div>
        </form>
      `;
    }

    function renderTask(task) {
      const isEditing = state.editingTaskId === task.task_id;
      const canEdit = EDITABLE_STATUSES.indexOf(task.status) !== -1;
      return `
        <article class="task">
          <div class="task-head">
            <div class="task-title">${TaskFlow.escapeHtml(task.title)}</div>
            <div class="badges">
              <span class="badge ${statusClass(task.status)}">${TaskFlow.escapeHtml(task.status)}</span>
              ${timer(task)}
              ${canEdit ? `<button class="secondary edit-btn" type="button" onclick="toggleEdit('${task.task_id}')">${isEditing ? '取消编辑' : '编辑'}</button>` : ''}
            </div>
          </div>
          <div class="meta">
            <span>类型：${TaskFlow.escapeHtml(task.task_type)}</span>
            <span>派发：${TaskFlow.escapeHtml(task.dispatcher || '-')}</span>
            <span>接收：${TaskFlow.escapeHtml(task.accepted_by || '-')}</span>
            ${task.created_at ? `<span>创建：${TaskFlow.escapeHtml(task.created_at)}</span>` : ''}
          </div>
          ${isEditing ? editForm(task) : `<div class="data-grid">${task.task_type === '线上支付' ? onlineFields(task) : offlineFields(task)}</div>${receiverInfo(task)}${proofPreview(task)}`}
          ${actions(task)}
        </article>
      `;
    }

    function onlineFields(task) {
      return items([
        ['组长', task.online_leader],
        ['转款银行', task.online_transfer_bank],
        ['转款金额', task.online_transfer_amount],
        ['派发时间', task.created_at],
      ]);
    }

    function offlineFields(task) {
      return items([
        ['组长', task.offline_business_name],
        ['公司名', task.offline_company_name],
        ['客户名字', task.offline_customer_name],
        ['日期时间', task.offline_datetime],
        ['金额', task.offline_amount],
        ['币种', task.offline_currency],
        ['料子', task.offline_material],
        ['次数', task.offline_times],
        ['维护期', task.offline_maintenance_period],
        ['尾刀客户', task.offline_tail_customer || '否'],
        ['联系方式', task.offline_contact || '不写'],
        ['详细地址', task.offline_address],
      ]);
    }

    function receiverInfo(task) {
      const rows = [];
      if (task.payment_card_holder) rows.push(['户主姓名', task.payment_card_holder]);
      if (task.payment_card_number) rows.push(['卡号', task.payment_card_number]);
      if (task.payment_receiving_bank) rows.push(['收款银行', task.payment_receiving_bank]);
      if (task.offline_collection_date) rows.push(['收款日期', task.offline_collection_date]);
      return rows.length ? `<h3>接收方返回信息</h3><div class="data-grid">${items(rows)}</div>` : '';
    }

    function proofPreview(task) {
      const urls = TaskFlow.parseProofUrls(task.transfer_proof_url);
      if (!urls.length) return '';
      const imgs = urls.map((url, i) => `
        <div class="proof-item">
          <a href="${TaskFlow.escapeAttr(url)}" target="_blank">图片 ${i + 1}</a>
          <img src="${TaskFlow.escapeAttr(url)}" alt="汇款图片 ${i + 1}" loading="lazy">
        </div>
      `).join('');
      return `<div class="proof-preview"><div class="proof-label">汇款图片（${urls.length} 张）</div>${imgs}</div>`;
    }

    const CANCELLABLE = ['待接收', '已接收', '待确认收款', '待上分确认', '已拒绝'];

    function cancelBar(task) {
      if (CANCELLABLE.indexOf(task.status) === -1) return '';
      return `
        <div class="cancel-bar">
          <input id="cancelNote-${task.task_id}" placeholder="取消原因（选填）" style="max-width:260px">
          <button class="danger" type="button" onclick="cancelTask('${task.task_id}')">取消订单</button>
        </div>
      `;
    }

    function actions(task) {
      const canUpload = task.task_type === '线上支付' && (task.status === '已接收' || task.status === '待确认收款');
      if (canUpload) {
        return `
          <div class="actions">
            <div class="field">
              <label for="proof-${task.task_id}">上传汇款图片（可多次上传）</label>
              <input id="proof-${task.task_id}" type="file" accept="image/*">
            </div>
            <div class="button-row">
              <button type="button" onclick="uploadProof('${task.task_id}')">上传图片</button>
            </div>
            ${cancelBar(task)}
          </div>
        `;
      }
      if (task.status === '待接收') {
        return `<div class="actions">${cancelBar(task)}<div class="desc">等待接收方处理。</div></div>`;
      }
      if (task.status === '待上分确认') {
        return `
          <div class="actions">
            <div class="desc">接收方已确认收款，请核实后点击确认上分完结任务。</div>
            <div class="button-row">
              <button type="button" onclick="confirmCredit('${task.task_id}')">确认上分</button>
            </div>
            ${cancelBar(task)}
          </div>
        `;
      }
      if (task.status === '已拒绝') {
        return `<div class="actions">${cancelBar(task)}</div>`;
      }
      return '';
    }

    function items(rows) {
      return rows.map(([label, value, raw]) => `<div class="data-item"><span>${TaskFlow.escapeHtml(label)}</span>${raw ? value : TaskFlow.escapeHtml(value || '-')}</div>`).join('');
    }

    function timer(task) {
      const start = task.status === '待接收' ? task.created_at : task.confirmed_at;
      if (!start || task.status === '已拒绝' || task.status === '已完结') return '';
      const value = TaskFlow.formatTimer(start);
      return `<span class="timer ${value.color}" data-start="${TaskFlow.escapeAttr(start)}">${value.label}</span>`;
    }

    function renderTimers() {
      document.querySelectorAll('.timer[data-start]').forEach((node) => {
        const value = TaskFlow.formatTimer(node.dataset.start);
        node.classList.remove('green', 'yellow', 'red');
        node.classList.add(value.color);
        node.textContent = value.label;
      });
    }

    async function cancelTask(taskId) {
      const note = document.getElementById(`cancelNote-${taskId}`);
      try {
        TaskFlow.setLoading(true);
        const data = await TaskFlow.cancelTask(taskId, note ? note.value.trim() : '');
        applyDashboard(data);
        TaskFlow.toast('订单已取消');
      } catch (error) {
        TaskFlow.toast(error.message || String(error));
      } finally {
        TaskFlow.setLoading(false);
      }
    }

    function statusClass(status) {
      return { '待接收': 'pending', '已接收': 'accepted', '待确认收款': 'proof', '待上分确认': 'credit', '已拒绝': 'rejected', '已取消': 'cancelled', '已完结': 'completed' }[status] || '';
    }
  </script>
</body>
</html>
