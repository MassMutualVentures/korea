<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>任务派发系统</title>
  <link rel="stylesheet" href="taskflow.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>任务派发系统</h1>
      <div class="account">账号登录</div>
    </div>
  </header>

  <main>
    <section class="login-shell">
      <div class="login-brand">
        <h2>任务派发系统</h2>
        <p>请登录以继续使用</p>
      </div>
      <form id="loginForm">
        <div class="field">
          <label for="username">账号</label>
          <input id="username" autocomplete="username" placeholder="请输入账号" required>
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="请输入密码" required>
        </div>
        <button type="submit" style="width:100%;margin-top:4px">登 录</button>
      </form>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="taskflow-api.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        TaskFlow.setLoading(true);
        const result = await TaskFlow.login(username, password);
        const user = result.user || {};
        if (user.canDispatch && !user.canReceive) {
          location.href = 'dispatch.html';
          return;
        }
        if (user.canReceive && !user.canDispatch) {
          location.href = 'receive.html';
          return;
        }
        location.href = 'dispatch.html';
      } catch (error) {
        TaskFlow.toast(error.message || String(error));
      } finally {
        TaskFlow.setLoading(false);
      }
    });
  </script>
</body>
</html>
