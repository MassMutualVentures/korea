<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>用户管理</title>
  <link rel="stylesheet" href="taskflow.css">
  <style>
    .user-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .user-table th { text-align: left; padding: 9px 12px; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 2px solid var(--line); background: #f8fafc; }
    .user-table td { padding: 11px 12px; border-bottom: 1px solid var(--line); vertical-align: middle; }
    .user-table tr:last-child td { border-bottom: 0; }
    .user-table tr:hover td { background: #f8fafc; }
    .active-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .dot-on { background: var(--ok); }
    .dot-off { background: #cbd5e1; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; background: #f1f5f9; color: #475569; margin: 1px; }
    .tag.admin { background: #faf5ff; color: #7c3aed; }
    .tag.dispatch { background: #eff6ff; color: #1d4ed8; }
    .tag.receive { background: #f0fdf4; color: #15803d; }
    .reset-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .reset-row input { width: 160px; }
    .section-body table-wrap { overflow-x: auto; }
    .panel-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; margin-top: 20px; }
    @media (max-width: 800px) { .panel-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>用户管理</h1>
      <div class="nav">
        <a class="button secondary" href="dispatch.html">派发工作台</a>
        <span class="account" id="account"></span>
        <button class="secondary" type="button" id="logoutButton">退出</button>
      </div>
    </div>
  </header>

  <main>
    <section>
      <div class="section-head">
        <h2>账号列表</h2>
        <button class="secondary" type="button" id="refreshBtn" style="min-height:32px;padding:4px 12px;font-size:13px">刷新</button>
      </div>
      <div class="section-body" style="padding:0;overflow-x:auto">
        <table class="user-table">
          <thead>
            <tr>
              <th>账号</th>
              <th>姓名</th>
              <th>角色</th>
              <th>状态</th>
              <th>创建时间</th>
              <th>重置密码</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr><td colspan="7" style="text-align:center;padding:24px;color:var(--muted)">加载中…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <div class="panel-2">
      <section>
        <div class="section-head"><h2>创建新账号</h2></div>
        <form id="createForm">
          <div class="field">
            <label for="newUsername">账号</label>
            <input id="newUsername" placeholder="登录账号" required>
          </div>
          <div class="field">
            <label for="newName">姓名</label>
            <input id="newName" placeholder="显示姓名" required>
          </div>
          <div class="field">
            <label for="newPassword">密码</label>
            <input id="newPassword" type="password" placeholder="至少 6 位" required>
          </div>
          <div class="field">
            <label for="newRole">角色</label>
            <select id="newRole">
              <option value="接收">接收</option>
              <option value="派发">派发</option>
              <option value="派发,接收">派发 + 接收</option>
              <option value="管理员">管理员</option>
            </select>
          </div>
          <button type="submit">创建账号</button>
        </form>
      </section>

      <section>
        <div class="section-head"><h2>角色说明</h2></div>
        <div class="section-body" style="font-size:13px;line-height:1.9;color:var(--muted)">
          <p style="margin:0 0 10px">
            <span class="tag receive">接收</span> 接收任务、填写收款信息、确认收款
          </p>
          <p style="margin:0 0 10px">
            <span class="tag dispatch">派发</span> 创建任务、上传汇款图片、确认上分
          </p>
          <p style="margin:0 0 10px">
            <span class="tag dispatch">派发</span><span class="tag receive">接收</span> 两种权限都有
          </p>
          <p style="margin:0">
            <span class="tag admin">管理员</span> 所有权限 + 用户管理
          </p>
        </div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="taskflow-api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!TaskFlow.requireLogin()) return;
      const user = TaskFlow.user() || {};
      if (!user.isAdmin) { location.href = 'dispatch.html'; return; }
      document.getElementById('account').innerHTML = TaskFlow.currentUserLabel();
      document.getElementById('logoutButton').addEventListener('click', async () => {
        await TaskFlow.logout();
        location.href = 'index.html';
      });
      document.getElementById('refreshBtn').addEventListener('click', loadUsers);
      document.getElementById('createForm').addEventListener('submit', createUser);
      loadUsers();
    });

    async function loadUsers() {
      try {
        TaskFlow.setLoading(true);
        const users = await TaskFlow.listUsers();
        renderTable(users);
      } catch (error) {
        TaskFlow.toast(error.message || String(error));
      } finally {
        TaskFlow.setLoading(false);
      }
    }

    function renderTable(users) {
      const tbody = document.getElementById('userTableBody');
      if (!users || !users.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--muted)">暂无账号</td></tr>';
        return;
      }
      tbody.innerHTML = users.map((u) => {
        const isActive = String(u.active || '').toUpperCase() === 'TRUE';
        const roles = parseRoleTags(u.role);
        return `
          <tr>
            <td><strong>${TaskFlow.escapeHtml(u.username)}</strong></td>
            <td>${TaskFlow.escapeHtml(u.name)}</td>
            <td>${roles}</td>
            <td>
              <span class="active-dot ${isActive ? 'dot-on' : 'dot-off'}"></span>
              ${isActive ? '启用' : '停用'}
            </td>
            <td style="color:var(--muted)">${TaskFlow.escapeHtml(u.created_at || '-')}</td>
            <td>
              <div class="reset-row">
                <input id="pwd-${TaskFlow.escapeAttr(u.username)}" type="password" placeholder="新密码">
                <button class="secondary" type="button" style="min-height:32px;padding:4px 10px;font-size:12px"
                  onclick="resetPwd('${TaskFlow.escapeAttr(u.username)}')">重置</button>
              </div>
            </td>
            <td>
              <button class="${isActive ? 'danger' : 'secondary'}" type="button"
                style="min-height:32px;padding:4px 12px;font-size:12px"
                onclick="toggleActive('${TaskFlow.escapeAttr(u.username)}')">
                ${isActive ? '停用' : '启用'}
              </button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function parseRoleTags(role) {
      const r = String(role || '').toLowerCase();
      const tags = [];
      if (r.includes('管理员') || r.includes('admin')) tags.push('<span class="tag admin">管理员</span>');
      else {
        if (r.includes('派发') || r.includes('dispatch')) tags.push('<span class="tag dispatch">派发</span>');
        if (r.includes('接收') || r.includes('receive') || r.includes('接受')) tags.push('<span class="tag receive">接收</span>');
      }
      return tags.join('') || `<span class="tag">${TaskFlow.escapeHtml(role)}</span>`;
    }

    async function toggleActive(username) {
      try {
        TaskFlow.setLoading(true);
        const users = await TaskFlow.toggleUserActive(username);
        renderTable(users);
        TaskFlow.toast('账号状态已更新');
      } catch (error) {
        TaskFlow.toast(error.message || String(error));
      } finally {
        TaskFlow.setLoading(false);
      }
    }

    async function resetPwd(username) {
      const input = document.getElementById(`pwd-${username}`);
      const newPassword = input ? input.value.trim() : '';
      if (!newPassword) { TaskFlow.toast('请输入新密码'); return; }
      if (newPassword.length < 6) { TaskFlow.toast('密码至少 6 位'); return; }
      try {
        TaskFlow.setLoading(true);
        await TaskFlow.adminResetPassword(username, newPassword);
        if (input) input.value = '';
        TaskFlow.toast(`${username} 密码已重置`);
      } catch (error) {
        TaskFlow.toast(error.message || String(error));
      } finally {
        TaskFlow.setLoading(false);
      }
    }

    async function createUser(event) {
      event.preventDefault();
      const username = document.getElementById('newUsername').value.trim();
      const name = document.getElementById('newName').value.trim();
      const password = document.getElementById('newPassword').value;
      const role = document.getElementById('newRole').value;
      try {
        TaskFlow.setLoading(true);
        await TaskFlow.adminCreateUser(username, password, name, role);
        event.target.reset();
        await loadUsers();
        TaskFlow.toast(`账号 ${username} 已创建`);
      } catch (error) {
        TaskFlow.toast(error.message || String(error));
      } finally {
        TaskFlow.setLoading(false);
      }
    }
  </script>
</body>
</html>
