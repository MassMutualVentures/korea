<!doctype html>
<html lang="zh-CN">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #f5f6f8;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #667085;
      --line: #d9dee7;
      --brand: #0f766e;
      --brand-dark: #115e59;
      --danger: #b42318;
      --warning: #b54708;
      --ok: #027a48;
      --shadow: 0 10px 28px rgba(16, 24, 40, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }

    .header-inner {
      max-width: 1320px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1,
    h2,
    h3 {
      margin: 0;
    }

    h1 {
      font-size: 22px;
    }

    h2 {
      font-size: 16px;
    }

    h3 {
      font-size: 14px;
      margin: 14px 0 10px;
    }

    .account {
      color: var(--muted);
      text-align: right;
    }

    main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px;
    }

    .notice {
      background: #fff7e6;
      color: #7a4b00;
      border: 1px solid #ffd587;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat,
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .stat {
      padding: 13px 15px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .stat strong {
      font-size: 23px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 390px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .login-shell {
      max-width: 420px;
      margin: 54px auto 0;
    }

    .section-head {
      padding: 15px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .section-body,
    form {
      padding: 16px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      color: var(--text);
      font: inherit;
      padding: 10px 11px;
      background: #ffffff;
    }

    textarea {
      min-height: 82px;
      resize: vertical;
    }

    .field {
      margin-bottom: 12px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 9px 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      min-height: 38px;
      background: var(--brand);
      color: #ffffff;
    }

    button:hover {
      background: var(--brand-dark);
    }

    button.secondary {
      background: #eef2f6;
      color: var(--text);
      border: 1px solid var(--line);
    }

    button.secondary:hover {
      background: #e4e9f0;
    }

    button.danger {
      background: var(--danger);
    }

    button.danger:hover {
      background: #912018;
    }

    button:disabled {
      opacity: 0.62;
      cursor: wait;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 12px 16px 0;
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
    }

    .tab {
      background: transparent;
      color: var(--muted);
      border: 1px solid transparent;
      border-bottom: 0;
      border-radius: 6px 6px 0 0;
      min-height: 36px;
      white-space: nowrap;
    }

    .tab.active {
      background: #ffffff;
      color: var(--brand-dark);
      border-color: var(--line);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .toolbar input {
      max-width: 390px;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .task {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #ffffff;
    }

    .task-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .task-title {
      font-size: 15px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
    }

    .badge,
    .timer {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge {
      background: #f2f4f7;
      color: #344054;
    }

    .pending {
      background: #fff7e6;
      color: var(--warning);
    }

    .accepted,
    .completed,
    .timer.green {
      background: #ecfdf3;
      color: var(--ok);
    }

    .proof {
      background: #e9f2ff;
      color: #175cd3;
    }

    .rejected,
    .timer.red {
      background: #fef3f2;
      color: var(--danger);
    }

    .timer.yellow {
      background: #fff7e6;
      color: var(--warning);
    }

    .meta,
    .data-grid {
      display: grid;
      gap: 7px 14px;
    }

    .meta {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      color: var(--muted);
      font-size: 12px;
      margin: 8px 0 10px;
    }

    .data-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 10px;
    }

    .data-item {
      border: 1px solid #edf0f5;
      border-radius: 6px;
      padding: 8px 9px;
      overflow-wrap: anywhere;
    }

    .data-item span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 3px;
    }

    .desc {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      color: #344054;
      margin-top: 8px;
    }

    .actions {
      display: grid;
      gap: 9px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #edf0f5;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .empty {
      color: var(--muted);
      padding: 22px;
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
    }

    .hidden {
      display: none !important;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      max-width: 380px;
      padding: 12px 14px;
      border-radius: 8px;
      color: #ffffff;
      background: #1f2933;
      box-shadow: var(--shadow);
      display: none;
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 960px) {
      .stats,
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      main,
      .header-inner {
        padding-left: 14px;
        padding-right: 14px;
      }

      .header-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .account {
        text-align: left;
      }

      .grid-2,
      .meta,
      .data-grid {
        grid-template-columns: 1fr;
      }

      .toolbar {
        flex-direction: column;
      }

      .toolbar input {
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>任务派发系统</h1>
      <div class="account" id="account"></div>
    </div>
  </header>

  <main>
    <div id="notice" class="notice hidden"></div>

    <section id="loginPanel" class="login-shell">
      <div class="section-head">
        <h2>账号登录</h2>
      </div>
      <form id="loginForm">
        <div class="field">
          <label for="loginUsername">账号</label>
          <input id="loginUsername" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="loginPassword">密码</label>
          <input id="loginPassword" type="password" autocomplete="current-password" required>
        </div>
        <button type="submit">登录</button>
      </form>
    </section>

    <div id="appShell" class="hidden">
      <div class="stats">
        <div class="stat"><span>待接收</span><strong id="statPending">0</strong></div>
        <div class="stat"><span>已接收</span><strong id="statAccepted">0</strong></div>
        <div class="stat"><span>待确认收款</span><strong id="statProof">0</strong></div>
        <div class="stat"><span>已拒绝</span><strong id="statRejected">0</strong></div>
        <div class="stat"><span>历史</span><strong id="statHistory">0</strong></div>
      </div>

      <div class="layout">
      <section id="dispatchPanel">
        <div class="section-head">
          <h2>派发任务</h2>
          <button class="secondary" type="button" id="setupButton">初始化表格</button>
        </div>
        <form id="taskForm">
          <div class="field">
            <label for="taskType">任务类型</label>
            <select id="taskType" name="task_type">
              <option>线上支付</option>
              <option>线下收款</option>
            </select>
          </div>

          <div id="onlineFields">
            <div class="field">
              <label for="onlineLeader">组长</label>
              <input id="onlineLeader" name="online_leader">
            </div>
            <div class="field">
              <label for="onlineTransferBank">转款银行</label>
              <input id="onlineTransferBank" name="online_transfer_bank">
            </div>
            <div class="field">
              <label for="onlineTransferAmount">转款金额</label>
              <input id="onlineTransferAmount" name="online_transfer_amount">
            </div>
          </div>

          <div id="offlineFields" class="hidden">
            <div class="field">
              <label for="offlineBusinessName">业务名字</label>
              <input id="offlineBusinessName" name="offline_business_name">
            </div>
            <div class="field">
              <label for="offlineCompanyName">公司名</label>
              <input id="offlineCompanyName" name="offline_company_name">
            </div>
            <div class="field">
              <label for="offlineCustomerName">客户名字</label>
              <input id="offlineCustomerName" name="offline_customer_name">
            </div>
            <div class="grid-2">
              <div class="field">
                <label for="offlineDatetime">日期时间</label>
                <input id="offlineDatetime" name="offline_datetime" type="datetime-local">
              </div>
              <div class="field">
                <label for="offlineAmount">金额</label>
                <input id="offlineAmount" name="offline_amount">
              </div>
            </div>
            <div class="grid-2">
              <div class="field">
                <label for="offlineCurrency">币种</label>
                <input id="offlineCurrency" name="offline_currency">
              </div>
              <div class="field">
                <label for="offlineMaterial">料子</label>
                <input id="offlineMaterial" name="offline_material">
              </div>
            </div>
            <div class="grid-2">
              <div class="field">
                <label for="offlineTimes">次数</label>
                <input id="offlineTimes" name="offline_times">
              </div>
              <div class="field">
                <label for="offlineMaintenancePeriod">维护期</label>
                <input id="offlineMaintenancePeriod" name="offline_maintenance_period">
              </div>
            </div>
            <div class="grid-2">
              <div class="field">
                <label for="offlineTailCustomer">是否后期尾刀客户</label>
                <select id="offlineTailCustomer" name="offline_tail_customer">
                  <option>否</option>
                  <option>是</option>
                </select>
              </div>
              <div class="field">
                <label for="offlineContact">联系方式</label>
                <input id="offlineContact" name="offline_contact" value="不写">
              </div>
            </div>
            <div class="field">
              <label for="offlineAddress">详细地址</label>
              <textarea id="offlineAddress" name="offline_address"></textarea>
            </div>
          </div>

          <div class="field">
            <label for="description">备注</label>
            <textarea id="description" name="description"></textarea>
          </div>
          <button type="submit" id="submitButton">派发</button>
        </form>
      </section>

      <section>
        <div class="tabs">
          <button class="tab active" data-tab="pending" type="button">待接收</button>
          <button class="tab" data-tab="accepted" type="button">已接收</button>
          <button class="tab" data-tab="proof" type="button">待确认收款</button>
          <button class="tab" data-tab="rejected" type="button">已拒绝</button>
          <button class="tab" data-tab="history" type="button">历史查询</button>
        </div>
        <div class="section-body">
          <div id="historyToolbar" class="toolbar hidden">
            <input id="historyKeyword" placeholder="按标题、负责人、金额、银行、备注搜索">
            <button class="secondary" type="button" id="historySearch">搜索</button>
          </div>
          <div id="taskList" class="list"></div>
        </div>
      </section>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    // GitHub Pages 部署时，把 Apps Script Web App URL 填到这里。
    // 例：https://script.google.com/macros/s/xxxxxxx/exec
    const APP_SCRIPT_API_URL = 'https://script.google.com/macros/s/AKfycbzKR-Ru-IclyTCsUtTCJ7rEsk6F4luP2bnXq6rSszK5_TGfa0M6Zc_-5LZNpYeHYZgW8w/exec';
    const TOKEN_KEY = 'taskFlowToken';
    const hasGoogleRuntime = typeof google !== 'undefined' && google.script && google.script.run;
    const hasApiRuntime = !!APP_SCRIPT_API_URL;
    const state = {
      activeTab: 'pending',
      tasks: [],
      history: [],
      user: null,
      token: localStorage.getItem(TOKEN_KEY) || '',
      loading: false,
    };

    const statusClass = {
      '待接收': 'pending',
      '已接收': 'accepted',
      '待确认收款': 'proof',
      '已拒绝': 'rejected',
      '已完结': 'completed',
    };

    document.addEventListener('DOMContentLoaded', () => {
      bindEvents();
      loadDashboard();
      setInterval(renderTimers, 30000);
    });

    function bindEvents() {
      document.getElementById('loginForm').addEventListener('submit', handleLogin);
      document.getElementById('taskType').addEventListener('change', toggleTaskFields);
      document.getElementById('taskForm').addEventListener('submit', handleCreateTask);
      document.getElementById('setupButton').addEventListener('click', setupSheets);
      document.getElementById('historySearch').addEventListener('click', searchHistory);
      document.getElementById('historyKeyword').addEventListener('keydown', (event) => {
        if (event.key === 'Enter') searchHistory();
      });

      document.querySelectorAll('.tab').forEach((button) => {
        button.addEventListener('click', () => {
          state.activeTab = button.dataset.tab;
          document.querySelectorAll('.tab').forEach((tab) => tab.classList.remove('active'));
          button.classList.add('active');
          render();
        });
      });
    }

    function toggleTaskFields() {
      const isOnline = document.getElementById('taskType').value === '线上支付';
      document.getElementById('onlineFields').classList.toggle('hidden', !isOnline);
      document.getElementById('offlineFields').classList.toggle('hidden', isOnline);
    }

    function loadDashboard() {
      if (!state.token) {
        renderLoggedOut();
        return;
      }

      setLoading(true);
      runServer('getDashboardData', [], (data) => {
        applyData(data);
        setLoading(false);
      });
    }

    function handleLogin(event) {
      event.preventDefault();
      const username = valueOf('loginUsername');
      const password = valueOf('loginPassword');
      setLoading(true);
      runServer('login', [username, password], (data) => {
        state.token = data.token;
        localStorage.setItem(TOKEN_KEY, data.token);
        applyData(data.dashboard);
        toast('登录成功');
        setLoading(false);
      });
    }

    function logout() {
      const oldToken = state.token;
      localStorage.removeItem(TOKEN_KEY);
      state.token = '';
      state.user = null;
      state.tasks = [];
      state.history = [];
      renderLoggedOut();
      if (oldToken) runServer('logout', [oldToken], () => {});
    }

    function setupSheets() {
      setLoading(true);
      runServer('setupSheets', [], (data) => {
        toast('表格已初始化');
        setLoading(false);
      });
    }

    function handleCreateTask(event) {
      event.preventDefault();
      const form = event.currentTarget;
      const payload = Object.fromEntries(new FormData(form).entries());
      setLoading(true);
      runServer('createTask', [payload], (data) => {
        form.reset();
        document.getElementById('offlineContact').value = '不写';
        toggleTaskFields();
        applyData(data);
        toast('任务已派发');
        setLoading(false);
      });
    }

    function acceptTask(taskId) {
      const task = findTask(taskId);
      const payload = {};

      if (task.task_type === '线上支付') {
        payload.payment_card_holder = valueOf(`cardHolder-${taskId}`);
        payload.payment_card_number = valueOf(`cardNumber-${taskId}`);
        payload.payment_receiving_bank = valueOf(`receivingBank-${taskId}`);
      } else {
        payload.offline_collection_date = valueOf(`collectionDate-${taskId}`);
      }
      payload.confirmation_note = valueOf(`acceptNote-${taskId}`);

      setLoading(true);
      runServer('acceptTask', [taskId, payload], (data) => {
        applyData(data);
        toast(task.task_type === '线下收款' ? '已确认收款并完结' : '已接收任务');
        setLoading(false);
      });
    }

    function rejectTask(taskId) {
      const note = valueOf(`rejectNote-${taskId}`);
      if (!note) {
        toast('请填写拒绝原因');
        return;
      }
      setLoading(true);
      runServer('rejectTask', [taskId, note], (data) => {
        applyData(data);
        toast('任务已拒绝');
        setLoading(false);
      });
    }

    function uploadTransferProof(taskId) {
      const input = document.getElementById(`proofFile-${taskId}`);
      if (!input.files || !input.files[0]) {
        toast('请先选择汇款图片');
        return;
      }

      const file = input.files[0];
      if (!file.type || file.type.indexOf('image/') !== 0) {
        toast('只能上传图片文件');
        return;
      }

      setLoading(true);
      const reader = new FileReader();
      reader.onload = () => {
        if (!hasGoogleRuntime && hasApiRuntime) {
          uploadTransferProofByForm(taskId, file, reader.result);
          return;
        }

        runServer('uploadTransferProof', [taskId, {
          name: file.name,
          mimeType: file.type,
          data: reader.result,
        }], (data) => {
          applyData(data);
          toast('汇款图片已上传，等待确认收款');
          setLoading(false);
        });
      };
      reader.onerror = () => {
        setLoading(false);
        toast('读取图片失败');
      };
      reader.readAsDataURL(file);
    }

    function confirmReceipt(taskId) {
      const note = valueOf(`receiptNote-${taskId}`);
      setLoading(true);
      runServer('confirmReceipt', [taskId, note], (data) => {
        applyData(data);
        toast('已确认收款，任务已完结');
        setLoading(false);
      });
    }

    function searchHistory() {
      const keyword = document.getElementById('historyKeyword').value;
      setLoading(true);
      runServer('searchHistory', [keyword], (rows) => {
        state.history = rows;
        document.getElementById('statHistory').textContent = rows.length;
        render();
        setLoading(false);
      });
    }

    function applyData(data) {
      state.user = data.user || null;
      state.tasks = data.tasks || [];
      state.history = data.history || [];
      document.getElementById('loginPanel').classList.add('hidden');
      document.getElementById('appShell').classList.remove('hidden');
      renderAccount();
      renderStats(data.stats || {});
      renderPermissions();
      render();
    }

    function renderAccount() {
      const user = state.user || {};
      const account = document.getElementById('account');
      if (!user.username) {
        account.textContent = '';
        return;
      }
      account.innerHTML = `${escapeHtml(user.name || user.username)} / ${escapeHtml(user.role || '未授权')} <button class="secondary" type="button" onclick="logout()">退出</button>`;
    }

    function renderLoggedOut() {
      document.getElementById('loginPanel').classList.remove('hidden');
      document.getElementById('appShell').classList.add('hidden');
      document.getElementById('account').textContent = '';
      const notice = document.getElementById('notice');
      if (!hasGoogleRuntime && !hasApiRuntime) {
        notice.textContent = '当前是本地预览模式。GitHub Pages 部署时，请先填写 APP_SCRIPT_API_URL。';
        notice.classList.remove('hidden');
      } else {
        notice.classList.add('hidden');
      }
    }

    function renderStats(stats) {
      document.getElementById('statPending').textContent = stats.pending || 0;
      document.getElementById('statAccepted').textContent = stats.accepted || 0;
      document.getElementById('statProof').textContent = stats.proofUploaded || 0;
      document.getElementById('statRejected').textContent = stats.rejected || 0;
      document.getElementById('statHistory').textContent = stats.history || 0;
    }

    function renderPermissions() {
      const user = state.user || {};
      const notice = document.getElementById('notice');
      const dispatchPanel = document.getElementById('dispatchPanel');
      dispatchPanel.classList.toggle('hidden', !user.canDispatch);

      if (!hasGoogleRuntime && !hasApiRuntime) {
        notice.textContent = '当前是本地预览模式。填写 APP_SCRIPT_API_URL 后，GitHub 页面会连接 Apps Script 后端。';
        notice.classList.remove('hidden');
        return;
      }

      notice.classList.add('hidden');
    }

    function render() {
      document.getElementById('historyToolbar').classList.toggle('hidden', state.activeTab !== 'history');
      const rows = visibleRows();
      const list = document.getElementById('taskList');

      if (!rows.length) {
        list.innerHTML = `<div class="empty">${state.loading ? '加载中...' : '暂无数据'}</div>`;
        return;
      }

      list.innerHTML = rows.map(renderTask).join('');
      renderTimers();
    }

    function visibleRows() {
      if (state.activeTab === 'history') return state.history;
      const map = {
        pending: '待接收',
        accepted: '已接收',
        proof: '待确认收款',
        rejected: '已拒绝',
      };
      return state.tasks.filter((task) => task.status === map[state.activeTab]);
    }

    function renderTask(task) {
      const fields = task.task_type === '线上支付' ? onlineFields(task) : offlineFields(task);
      return `
        <article class="task">
          <div class="task-head">
            <div>
              <div class="task-title">${escapeHtml(task.title)}</div>
              <div class="meta">
                <span>类型：${escapeHtml(task.task_type)}</span>
                <span>派发：${escapeHtml(task.dispatcher || '-')}</span>
                <span>接收：${escapeHtml(task.accepted_by || '-')}</span>
              </div>
            </div>
            <div class="badges">
              <span class="badge ${statusClass[task.status] || ''}">${escapeHtml(task.status)}</span>
              ${timerBadge(task)}
            </div>
          </div>
          <div class="data-grid">${fields}</div>
          ${responseFields(task)}
          ${task.description ? `<div class="desc">备注：${escapeHtml(task.description)}</div>` : ''}
          ${historyNotes(task)}
          ${renderActions(task)}
        </article>
      `;
    }

    function onlineFields(task) {
      return [
        ['组长', task.online_leader],
        ['转款银行', task.online_transfer_bank],
        ['转款金额', task.online_transfer_amount],
        ['派发时间', task.created_at],
      ].map(dataItem).join('');
    }

    function offlineFields(task) {
      return [
        ['业务名字', task.offline_business_name],
        ['公司名', task.offline_company_name],
        ['客户名字', task.offline_customer_name],
        ['日期时间', task.offline_datetime],
        ['金额', task.offline_amount],
        ['币种', task.offline_currency],
        ['料子', task.offline_material],
        ['次数', task.offline_times],
        ['维护期', task.offline_maintenance_period],
        ['是否后期尾刀客户', task.offline_tail_customer || '否'],
        ['联系方式', task.offline_contact || '不写'],
        ['详细地址', task.offline_address],
      ].map(dataItem).join('');
    }

    function responseFields(task) {
      const rows = [];
      if (task.payment_card_holder) rows.push(['户主姓名', task.payment_card_holder]);
      if (task.payment_card_number) rows.push(['卡号', task.payment_card_number]);
      if (task.payment_receiving_bank) rows.push(['收款银行', task.payment_receiving_bank]);
      if (task.offline_collection_date) rows.push(['收款日期', task.offline_collection_date]);
      if (task.transfer_proof_url) rows.push(['汇款图片', `<a href="${escapeAttr(task.transfer_proof_url)}" target="_blank">打开图片</a>`]);
      if (!rows.length) return '';
      return `<h3>接收/收款信息</h3><div class="data-grid">${rows.map((item) => dataItem(item, true)).join('')}</div>`;
    }

    function historyNotes(task) {
      const rows = [];
      if (task.confirmation_note) rows.push(`接收备注：${escapeHtml(task.confirmation_note)}`);
      if (task.completion_note) rows.push(`完结备注：${escapeHtml(task.completion_note)}`);
      if (!rows.length) return '';
      return `<div class="desc">${rows.join('<br>')}</div>`;
    }

    function renderActions(task) {
      const user = state.user || {};
      if (state.activeTab === 'history') return '';

      if (task.status === '待接收' && user.canReceive) {
        return task.task_type === '线上支付' ? onlineAcceptActions(task) : offlineAcceptActions(task);
      }

      if (task.status === '待接收' && user.canDispatch) {
        return `<div class="actions"><div class="desc">等待接收方确认。派发计时超过 20 分钟会变红。</div></div>`;
      }

      if (task.status === '已接收' && task.task_type === '线上支付' && user.canDispatch) {
        return `
          <div class="actions">
            <div class="field">
              <label for="proofFile-${task.task_id}">上传汇款图片</label>
              <input id="proofFile-${task.task_id}" type="file" accept="image/*">
            </div>
            <div class="button-row">
              <button type="button" onclick="uploadTransferProof('${task.task_id}')">上传汇款图片</button>
            </div>
          </div>
        `;
      }

      if (task.status === '已接收' && task.task_type === '线上支付' && user.canReceive) {
        return `<div class="actions"><div class="desc">已提交银行卡信息，等待派发方上传汇款图片。</div></div>`;
      }

      if (task.status === '待确认收款' && task.task_type === '线上支付' && user.canReceive) {
        return `
          <div class="actions">
            <div class="field">
              <label for="receiptNote-${task.task_id}">确认备注</label>
              <textarea id="receiptNote-${task.task_id}" placeholder="确认收到款项后提交"></textarea>
            </div>
            <div class="button-row">
              <button type="button" onclick="confirmReceipt('${task.task_id}')">确认收款并完结</button>
            </div>
          </div>
        `;
      }

      if (task.status === '待确认收款' && user.canDispatch) {
        return `<div class="actions"><div class="desc">汇款图片已上传，等待接收方确认收款。</div></div>`;
      }

      return '';
    }

    function onlineAcceptActions(task) {
      return `
        <div class="actions">
          <div class="grid-2">
            <div class="field">
              <label for="cardHolder-${task.task_id}">户主姓名</label>
              <input id="cardHolder-${task.task_id}">
            </div>
            <div class="field">
              <label for="receivingBank-${task.task_id}">收款银行</label>
              <input id="receivingBank-${task.task_id}">
            </div>
          </div>
          <div class="field">
            <label for="cardNumber-${task.task_id}">卡号</label>
            <input id="cardNumber-${task.task_id}">
          </div>
          <div class="field">
            <label for="acceptNote-${task.task_id}">接收备注</label>
            <textarea id="acceptNote-${task.task_id}"></textarea>
          </div>
          <div class="button-row">
            <button type="button" onclick="acceptTask('${task.task_id}')">确认接收</button>
            <button class="danger" type="button" onclick="rejectTask('${task.task_id}')">拒绝</button>
          </div>
          <div class="field">
            <label for="rejectNote-${task.task_id}">拒绝原因</label>
            <textarea id="rejectNote-${task.task_id}"></textarea>
          </div>
        </div>
      `;
    }

    function offlineAcceptActions(task) {
      return `
        <div class="actions">
          <div class="field">
            <label for="collectionDate-${task.task_id}">收款日期</label>
            <input id="collectionDate-${task.task_id}" type="date">
          </div>
          <div class="field">
            <label for="acceptNote-${task.task_id}">确认备注</label>
            <textarea id="acceptNote-${task.task_id}" placeholder="提交后任务直接完结"></textarea>
          </div>
          <div class="button-row">
            <button type="button" onclick="acceptTask('${task.task_id}')">确认收款并完结</button>
            <button class="danger" type="button" onclick="rejectTask('${task.task_id}')">拒绝</button>
          </div>
          <div class="field">
            <label for="rejectNote-${task.task_id}">拒绝原因</label>
            <textarea id="rejectNote-${task.task_id}"></textarea>
          </div>
        </div>
      `;
    }

    function timerBadge(task) {
      const start = task.status === '待接收' ? task.created_at : task.confirmed_at;
      if (!start || task.status === '已拒绝' || task.status === '已完结') return '';
      return `<span class="timer" data-start="${escapeAttr(start)}">计时中</span>`;
    }

    function renderTimers() {
      document.querySelectorAll('.timer[data-start]').forEach((node) => {
        const start = parseDate(node.dataset.start);
        if (!start) return;
        const minutes = Math.floor((Date.now() - start.getTime()) / 60000);
        node.classList.remove('green', 'yellow', 'red');
        node.classList.add(minutes <= 10 ? 'green' : minutes <= 20 ? 'yellow' : 'red');
        node.textContent = `${minutes < 0 ? 0 : minutes} 分钟`;
      });
    }

    function dataItem(item, raw) {
      const label = Array.isArray(item) ? item[0] : '';
      const value = Array.isArray(item) ? item[1] : '';
      return `<div class="data-item"><span>${escapeHtml(label)}</span>${raw ? value : escapeHtml(value || '-')}</div>`;
    }

    function setLoading(isLoading) {
      state.loading = isLoading;
      render();
      document.querySelectorAll('button').forEach((button) => {
        button.disabled = isLoading;
      });
    }

    function runServer(method, args, onSuccess) {
      if (hasGoogleRuntime) {
        googleRun(method, args, onSuccess);
        return;
      }

      if (hasApiRuntime) {
        jsonpRun(method, args, onSuccess);
        return;
      }

      if (!hasGoogleRuntime) {
        mockServer(method, args, onSuccess);
        return;
      }
    }

    function googleRun(method, args, onSuccess) {
      const serverArgs = googleArgs(method, args);
      google.script.run
        .withSuccessHandler(onSuccess)
        .withFailureHandler((error) => {
          setLoading(false);
          toast(error && error.message ? error.message : String(error));
        })[method](...serverArgs);
    }

    function jsonpRun(method, args, onSuccess) {
      const callbackName = `taskFlowCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
      const params = apiParams(method, args, callbackName);
      const script = document.createElement('script');
      const query = new URLSearchParams(params).toString();

      window[callbackName] = (payload) => {
        delete window[callbackName];
        script.remove();
        if (!payload.ok) {
          setLoading(false);
          toast(payload.error || '请求失败');
          return;
        }
        onSuccess(payload.result);
      };

      script.onerror = () => {
        delete window[callbackName];
        script.remove();
        setLoading(false);
        toast('无法连接 Apps Script 后端');
      };

      script.src = `${APP_SCRIPT_API_URL}?${query}`;
      document.body.appendChild(script);
    }

    function googleArgs(method, args) {
      if (method === 'login') return args;
      if (method === 'logout') return [args[0] || state.token];
      if (method === 'setupSheets') return [];
      if (method === 'getDashboardData') return [state.token, ''];
      if (method === 'createTask') return [state.token, args[0]];
      if (method === 'acceptTask') return [state.token, args[0], args[1]];
      if (method === 'rejectTask') return [state.token, args[0], args[1]];
      if (method === 'uploadTransferProof') return [state.token, args[0], args[1]];
      if (method === 'confirmReceipt') return [state.token, args[0], args[1]];
      if (method === 'searchHistory') return [state.token, args[0]];
      return args;
    }

    function apiParams(method, args, callbackName) {
      const params = { action: method, callback: callbackName };
      if (method === 'login') {
        params.username = args[0];
        params.password = args[1];
      } else if (method === 'logout') {
        params.token = args[0] || state.token;
      } else if (method === 'setupSheets') {
        params.token = state.token;
      } else if (method === 'getDashboardData') {
        params.token = state.token;
      } else if (method === 'createTask') {
        params.token = state.token;
        params.payload = JSON.stringify(args[0] || {});
      } else if (method === 'acceptTask') {
        params.token = state.token;
        params.taskId = args[0];
        params.payload = JSON.stringify(args[1] || {});
      } else if (method === 'rejectTask') {
        params.token = state.token;
        params.taskId = args[0];
        params.note = args[1] || '';
      } else if (method === 'confirmReceipt') {
        params.token = state.token;
        params.taskId = args[0];
        params.note = args[1] || '';
      } else if (method === 'searchHistory') {
        params.token = state.token;
        params.keyword = args[0] || '';
      }
      return params;
    }

    function uploadTransferProofByForm(taskId, file, dataUrl) {
      const iframeName = `uploadFrame_${Date.now()}`;
      const iframe = document.createElement('iframe');
      iframe.name = iframeName;
      iframe.className = 'hidden';
      document.body.appendChild(iframe);

      const form = document.createElement('form');
      form.method = 'POST';
      form.action = APP_SCRIPT_API_URL;
      form.target = iframeName;
      form.className = 'hidden';

      const fields = {
        action: 'uploadTransferProof',
        token: state.token,
        taskId,
        name: file.name,
        mimeType: file.type,
        data: dataUrl,
      };

      Object.keys(fields).forEach((name) => {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = name;
        input.value = fields[name];
        form.appendChild(input);
      });

      iframe.onload = () => {
        form.remove();
        iframe.remove();
        runServer('getDashboardData', [], (data) => {
          applyData(data);
          toast('汇款图片已上传，等待确认收款');
          setLoading(false);
        });
      };

      document.body.appendChild(form);
      form.submit();
    }

    function mockServer(method, args, onSuccess) {
      setTimeout(() => {
        if (method === 'login') {
          const data = mockData();
          onSuccess({ token: 'preview-token', user: data.user, dashboard: data });
          return;
        }
        if (method === 'getDashboardData') {
          onSuccess(mockData());
          return;
        }
        if (method === 'setupSheets') {
          onSuccess({ ok: true });
          return;
        }
        if (method === 'searchHistory') {
          onSuccess([]);
          return;
        }
        const data = mockData();
        onSuccess(data);
      }, 250);
    }

    function mockData() {
      const now = new Date();
      const created = new Date(now.getTime() - 8 * 60000);
      const confirmed = new Date(now.getTime() - 14 * 60000);
      return {
        user: {
          username: 'admin',
          name: '预览管理员',
          role: '管理员',
          authorized: true,
          canDispatch: true,
          canReceive: true,
          isAdmin: true,
        },
        tasks: [
          {
            task_id: 'preview-online-1',
            task_type: '线上支付',
            title: '线上支付 - 50000',
            status: '待接收',
            dispatcher: 'dispatch@example.com',
            created_at: formatMockDate(created),
            online_leader: '张组长',
            online_transfer_bank: '工商银行',
            online_transfer_amount: '50000',
          },
          {
            task_id: 'preview-online-2',
            task_type: '线上支付',
            title: '线上支付 - 30000',
            status: '已接收',
            dispatcher: 'dispatch@example.com',
            accepted_by: 'receiver@example.com',
            created_at: formatMockDate(created),
            confirmed_at: formatMockDate(confirmed),
            online_leader: '李组长',
            online_transfer_bank: '建设银行',
            online_transfer_amount: '30000',
            payment_card_holder: '王某',
            payment_card_number: '6222 **** **** 8899',
            payment_receiving_bank: '招商银行',
          },
        ],
        history: [],
        stats: {
          pending: 1,
          accepted: 1,
          proofUploaded: 0,
          rejected: 0,
          history: 0,
        },
      };
    }

    function formatMockDate(date) {
      const pad = (value) => String(value).padStart(2, '0');
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
    }

    function parseDate(value) {
      if (!value) return null;
      const normalized = String(value).replace(' ', 'T');
      const date = new Date(normalized);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function findTask(taskId) {
      return state.tasks.find((task) => task.task_id === taskId) || {};
    }

    function valueOf(id) {
      const node = document.getElementById(id);
      return node ? node.value.trim() : '';
    }

    function toast(message) {
      const box = document.getElementById('toast');
      box.textContent = message;
      box.classList.add('show');
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => box.classList.remove('show'), 2600);
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#096;');
    }
  </script>
</body>
</html>
